{% extends 'core/base.html' %}

{% block content %}
<div class="container-fluid px-0">
    <!-- Cabeçalho -->
    <div class="d-flex justify-content-between align-items-center mb-4 animate__animated animate__fadeIn">
        <div>
            <h1 class="h2 mb-2">
                <i class="bi bi-hourglass-split text-success me-2"></i>Progresso do Download
            </h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/" class="text-decoration-none">Principal</a></li>
                    <li class="breadcrumb-item"><a href="{% url 'download_manual' %}" class="text-decoration-none">Download</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Progresso</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Card de Progresso -->
    <div class="card animate__animated animate__fadeInUp">
        <div class="card-body text-center p-5">
            <div class="mb-4">
                <div class="spinner-border text-success" style="width: 4rem; height: 4rem;" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
            </div>
            
            <h4 class="mb-3">Download em andamento</h4>
            <p class="text-muted mb-4">ID da tarefa: {{ tarefa_id }}</p>
            
            <div class="progress mb-3" style="height: 25px;">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" 
                     role="progressbar" style="width: 0%;" id="progressBar">0%</div>
            </div>
            
            <p class="text-muted" id="statusMessage">Iniciando download...</p>
            
            <div class="mt-4">
                <a href="{% url 'historico' %}" class="btn btn-outline-success">
                    <i class="bi bi-clock-history me-2"></i>Ver Histórico
                </a>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
// Simular progresso (depois substituir por chamada AJAX real)
let progresso = 0;
const interval = setInterval(function() {
    progresso += Math.random() * 10;
    if (progresso >= 100) {
        progresso = 100;
        clearInterval(interval);
        document.getElementById('statusMessage').innerHTML = 'Download concluído com sucesso!';
    }
    document.getElementById('progressBar').style.width = progresso + '%';
    document.getElementById('progressBar').innerHTML = Math.round(progresso) + '%';
}, 1000);
</script>
{% endblock %}
{% endblock %}
