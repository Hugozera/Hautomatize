{% extends 'core/base.html' %}

{% block content %}
<div class="container-fluid px-0" style="margin-top:80px;">
  <div class="card animate__animated animate__fadeIn">
    <div class="card-body">
      <h3 class="card-title mb-4 text-center" style="color: var(--verde-deep);">
        <i class="bi bi-shield-lock me-2"></i>Entrar
      </h3>
      
      {% if form.errors %}
        <div class="alert alert-danger animate__animated animate__shakeX">
          <i class="bi bi-exclamation-triangle me-2"></i>
          Nome de usuário ou senha inválidos.
        </div>
      {% endif %}
      
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        
        <div class="mb-3">
          <label for="{{ form.username.id_for_label }}" class="form-label">
            <i class="bi bi-person me-1"></i>Usuário
          </label>
          <input type="text" name="{{ form.username.name }}" class="form-control" id="{{ form.username.id_for_label }}" required>
        </div>
        
        <div class="mb-4">
          <label for="{{ form.password.id_for_label }}" class="form-label">
            <i class="bi bi-key me-1"></i>Senha
          </label>
          <input type="password" name="{{ form.password.name }}" class="form-control" id="{{ form.password.id_for_label }}" required>
        </div>
        
        <input type="hidden" name="next" value="{{ next }}">
        
        <button class="btn btn-success w-100 py-2" type="submit">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>
    </div>
    
    <div class="card-footer text-center bg-transparent">
      <small class="text-muted">
        <i class="bi bi-download me-1"></i>
        Hautomatize - Download Automático de NFSe
      </small>
    </div>
  </div>
</div>
{% endblock %}
