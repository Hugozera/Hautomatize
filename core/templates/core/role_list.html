{% extends 'core/base.html' %}

{% block content %}
<div class="container-fluid px-0">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h3"><i class="bi bi-person-badge text-success me-2"></i>Papéis (Roles)</h1>
    </div>
    <div>
      <a href="{% url 'role_create' %}" class="btn btn-success"><i class="bi bi-plus-circle me-1"></i>Novo Papel</a>
    </div>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Código</th>
              <th>Permissões</th>
              <th>Usuários</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            {% for r in roles %}
            <tr>
              <td>{{ r.name }}</td>
              <td><code>{{ r.codename }}</code></td>
              <td>{{ r.permissions }}</td>
              <td>{{ r.pessoas.count }}</td>
              <td>
                <a href="{% url 'role_edit' r.pk %}" class="btn btn-sm btn-outline-primary">Editar</a>
                <a href="{% url 'role_delete' r.pk %}" class="btn btn-sm btn-outline-danger">Excluir</a>
              </td>
            </tr>
            {% empty %}
            <tr><td colspan="5" class="text-center py-4">Nenhum papel cadastrado.</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
