{% extends 'core/base.html' %}

{% block content %}
<div class="container" style="max-width:600px;">
  <div class="card">
    <div class="card-body text-center">
      <h4>Excluir Papel</h4>
      <p>Tem certeza que deseja excluir o papel <strong>{{ role.name }}</strong>? Esta ação é irreversível.</p>
      <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Confirmar exclusão</button>
        <a href="{% url 'role_list' %}" class="btn btn-outline-secondary">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
